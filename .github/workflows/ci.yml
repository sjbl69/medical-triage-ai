name: CI - Medical Triage API

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t medical-triage-ai .

      - name: Run container (mode CI)
        run: docker run -d -p 8080:8080 -e CI=true medical-triage-ai

      - name: Wait for API
        run: |
          echo "Waiting for API..."
          for i in {1..20}; do
            if curl -s http://localhost:8080/; then
              echo "API is up!"
              break
            fi
            sleep 5
          done

      - name: Test endpoint
        run: |
          curl -X POST http://localhost:8080/generate \
          -H "Content-Type: application/json" \
          -d '{"symptom":"douleur thoracique"}'